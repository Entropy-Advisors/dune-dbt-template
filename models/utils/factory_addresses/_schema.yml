version: 2

models:
  - name: dim_dex_factory_addresses
    description: >
      Single source of truth for all DEX factory and PoolManager contract addresses.
      Each row registers one deployed contract on one chain for one protocol version.

      Fed by: no upstream dbt models — rows are maintained directly in this file.
      Feeds: all pool creation staging models (stg_uniswap_v2_pool_created,
        stg_uniswap_v3_pool_created, stg_uniswap_v4_pool_initialized,
        stg_sushiswap_v2_pool_created, stg_sushiswap_v3_pool_created,
        stg_pancakeswap_v2_pool_created, stg_pancakeswap_v3_pool_created,
        stg_gammaswap_pool_created, stg_camelot_v2_pool_created, stg_camelot_v3_pool_created)
        via a tuple IN join for Trino partition/row-group pruning.

      Update paths:
        - Agent-driven: run a jobs/refresh_*.md job to add new rows directly.
        - Bulk import: scripts/sync_factory_addresses.py reads from a Google Sheet.

      Protocol and chain coverage (as of last update):
        - Uniswap V2: ethereum, arbitrum, optimism, polygon, avalanche_c, bnb, base, blast,
            zora, worldchain, unichain, monad, megaeth
        - Uniswap V3: ethereum, arbitrum, optimism, polygon, avalanche_c, bnb, base, blast,
            zora, worldchain, unichain, celo, zksync, monad, megaeth
        - Uniswap V4 (PoolManager — no factory): ethereum, unichain, optimism, base, arbitrum,
            polygon, blast, zora, worldchain, avalanche_c, bnb, celo, monad, megaeth
        - SushiSwap V2: 35+ chains (arbitrum, ethereum, base, bnb, polygon, and more)
        - SushiSwap V3: 30+ chains (arbitrum, ethereum, base, bnb, polygon, katana, and more)
        - PancakeSwap V2: bnb, ethereum, zksync, zkevm, arbitrum, linea, base, opbnb, monad
        - PancakeSwap V3: bnb, ethereum, zksync, zkevm, arbitrum, linea, base, opbnb, monad
        - GammaSwap (DeltaSwap): ethereum, arbitrum, base
        - Camelot V2/V3: arbitrum only

      V4 distinction: Uniswap V4 uses a PoolManager contract per chain rather than a factory.
      Staging models use the CTE name `pool_manager_addresses` (not `factory_addresses`) when
      filtering V4 events.

      Staging models filter with a tuple IN join to ensure correct (blockchain, contract_address)
      pairing — two separate INs would allow any blockchain paired with any address, which is incorrect:
        and (l.blockchain, l.contract_address) in (select blockchain, contract_address from factory_addresses)
    columns:
      - name: protocol
        description: "DEX protocol name in lowercase (e.g. 'uniswap', 'sushiswap', 'pancakeswap', 'gammaswap', 'camelot')"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['uniswap', 'sushiswap', 'pancakeswap', 'gammaswap', 'camelot']
      - name: version
        description: "Protocol version string (e.g. '2', '3', '4', 'deltaswap')"
        tests:
          - not_null
      - name: blockchain
        description: "Dune chain name in lowercase (e.g. 'ethereum', 'arbitrum', 'base', 'zksync', 'opbnb', 'katana')"
        tests:
          - not_null
      - name: contract_address
        description: "Factory contract address (V2/V3) or PoolManager address (V4). Stored as varbinary literal — no casting needed in joins."
        tests:
          - not_null
      - name: min_block_number
        description: "Deployment block number for this contract. Staging models use this to skip pre-deployment history and narrow partition scans. Must always be a real block number — never a placeholder value."
        tests:
          - not_null
