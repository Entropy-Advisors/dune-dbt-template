version: 2

models:
  - name: fact_token_supply
    description: >
      Daily circulating supply and market cap per token per chain.
      All days from deployment onward are gap-filled — quiet days appear with NULL
      mint/burn/net_change but carry forward cumulative and supply values.

      Fed by: `int_token_daily_supply` (supply columns), `prices.day` (price join).
      Price join key: (date = day, blockchain, contract_address).

      market_cap = circulating_supply × price. NULL when price is unavailable for that day.
      blockchain is title-cased via initcap() (e.g. 'Ethereum', 'Base', 'Arbitrum') to match
      Dune dashboard conventions.
    columns:
      - name: date
        description: "Day-truncated date"
      - name: blockchain
        description: "Chain name, title-cased (e.g. Ethereum, Base, Arbitrum)"
      - name: contract_address
        description: "Token contract address"
      - name: symbol
      - name: price
        description: "Token price in USD from prices.day"
      - name: mint_volume
        description: "Tokens minted on this day (NULL for quiet days)"
      - name: burn_volume
        description: "Tokens burned on this day (NULL for quiet days)"
      - name: net_change
        description: "mint_volume - burn_volume (NULL for quiet days)"
      - name: mint_volume_cumulative
        description: "Running cumulative mints"
      - name: burn_volume_cumulative
        description: "Running cumulative burns"
      - name: circulating_supply
        description: "Running cumulative net_change (mints - burns)"
      - name: market_cap
        description: "circulating_supply × price"
