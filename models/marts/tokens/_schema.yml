version: 2

models:
  - name: fact_token_supply
    description: >
      Hourly circulating supply and market cap per token per chain.
      All hours from first transfer onward are filled via utils.hours cross join.
      Prices joined from prices.hour on (timestamp, blockchain, contract_address).
      Blockchain names are title-cased via initcap().
    columns:
      - name: date
        description: "Hour-truncated timestamp"
      - name: blockchain
        description: "Chain name, title-cased (e.g. Ethereum, Base, Arbitrum)"
      - name: contract_address
        description: "Token contract address"
      - name: symbol
      - name: price
        description: "Token price in USD from prices.hour"
      - name: mint_volume
        description: "Tokens minted in this hour (NULL for quiet hours)"
      - name: burn_volume
        description: "Tokens burned in this hour (NULL for quiet hours)"
      - name: net_change
        description: "mint_volume - burn_volume (NULL for quiet hours)"
      - name: mint_volume_cumulative
        description: "Running cumulative mints"
      - name: burn_volume_cumulative
        description: "Running cumulative burns"
      - name: circulating_supply
        description: "Running cumulative net_change (mints - burns)"
      - name: market_cap
        description: "circulating_supply × price"
