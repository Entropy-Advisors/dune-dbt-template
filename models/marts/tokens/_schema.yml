version: 2

models:
  - name: fact_token_daily_supply
    description: >
      Hourly circulating supply and market cap per token per chain.
      All hours from first transfer onward are filled via utils.hours cross join.
      Prices joined from prices.hour on (timestamp, blockchain, contract_address).
      Blockchain names are title-cased via initcap().
    columns:
      - name: date
        description: "Day-truncated date"
      - name: blockchain
        description: "Chain name in lowercase (e.g. base, arbitrum, plasma)"
      - name: contract_address
        description: "Token contract address"
      - name: symbol
      - name: price
        description: "Token price in USD from prices.hour"
      - name: mint_volume
        description: "Tokens minted on this day (NULL for quiet days)"
      - name: burn_volume
        description: "Tokens burned on this day (NULL for quiet days)"
      - name: net_change
        description: "mint_volume - burn_volume (NULL for quiet days)"
      - name: mint_volume_cumulative
        description: "Running cumulative mints"
      - name: burn_volume_cumulative
        description: "Running cumulative burns"
      - name: circulating_supply
        description: "Running cumulative net_change (mints - burns)"

  - name: fact_token_holder_daily_balance
    description: >
      Daily token balance per (blockchain, contract_address, wallet_address).
      All days from the token's deployment date onward are gap-filled — quiet days appear with NULL
      net_change but carry forward the cumulative balance.

      Fed by: `int_token_holder_daily_net_change` (daily activity + spine anchor via min_block_time).

      Owns the daily spine (utils.days × wallet_tokens), gap-fill, and cumulative window function.
      Rows where `balance <= 0` are excluded — wallets that have fully exited and rounding artefacts.
    columns:
      - name: day
        description: "Calendar date (UTC)"
      - name: blockchain
        description: "Chain name in lowercase (e.g. base, arbitrum, plasma)"
      - name: contract_address
        description: "Token contract address"
      - name: wallet_address
        description: "Wallet address holding the token"
      - name: symbol
      - name: category
        description: "Asset category from dim_labels (e.g. 'stablecoin', 'ybs', 'rwa')"
      - name: min_block_time
        description: "Token deployment timestamp from dim_labels — used to anchor the days spine"
      - name: net_change
        description: "Net token flow into the wallet on this day; NULL on gap-filled days with no transfers"
      - name: balance
        description: "Cumulative token balance held by the wallet at end of day; rows where balance <= 0 are excluded"
