version: 2

models:
  - name: stg_token_mint_burn_events
    description: >
      Raw mint and burn transfer events for tokens in dim_labels (type = 'token').
      One row per transfer. No aggregation.
      Filtered to post-deployment blocks via start_block from dim_labels.
      Partitioned by blockchain and block_date.
    columns:
      - name: block_time
      - name: block_date
        description: "Partition column"
        tests:
          - not_null
      - name: blockchain
        tests:
          - not_null
      - name: contract_address
        tests:
          - not_null
      - name: symbol
      - name: amount
        description: "Decimal-adjusted token amount from tokens.transfers"
      - name: transfer_type
        description: "'mint' (from = 0x0) or 'burn' (to = 0x0)"
        tests:
          - not_null
          - accepted_values:
              values: ['mint', 'burn']
