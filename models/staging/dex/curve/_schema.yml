version: 2

models:
  - name: stg_curve_twocrypto_ng_pool_created
    description: >
      Full-decode bronze layer. All TwocryptoPoolDeployed ABI fields decoded and output.
      TwoCrypto NG pools contain exactly 2 volatile assets (e.g. ETH/BTC, ETH/CRV).
      One row per pool creation event. No aggregation.
      Factory addresses sourced from `dim_dex_factory_addresses.sql` (protocol='curve', version='twocrypto_ng').
      Partitioned by blockchain and block_date.
      topic0: 0x8152a3037e3dc54154ad0d2cadb1cf7e1d1b9e2b625faa3dfb4fe03d609102ca
      Event: TwocryptoPoolDeployed(address pool, string name, string symbol, address[2] coins, address math, bytes32 salt, uint256[2] precisions, uint256 packed_A_gamma, uint256 packed_fee_params, uint256 packed_rebalancing_params, uint256 packed_prices, address deployer)
      Feeds into: `int_dex_pool_created` (UNION ALL branch) and serves as the pool address
      whitelist for `stg_dex_pool_token_transfers`.
    columns:
      - name: blockchain
        description: "Chain the pool was deployed on (e.g. ethereum, arbitrum, base)"
        tests:
          - not_null
      - name: contract_address
        description: "TwoCrypto NG factory contract address that emitted the TwocryptoPoolDeployed event"
        tests:
          - not_null
      - name: protocol
        description: "Always 'curve'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['curve']
      - name: version
        description: "Always 'twocrypto_ng'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['twocrypto_ng']
      - name: block_date
        description: "Partition column — date of the block"
        tests:
          - not_null
      - name: block_time
        description: "Timestamp of the block"
        tests:
          - not_null
      - name: block_number
        tests:
          - not_null
      - name: tx_hash
        description: "Transaction hash of the pool creation"
        tests:
          - not_null
      - name: tx_from
        description: "Address that submitted the pool creation transaction"
      - name: pool
        description: "Address of the newly created TwoCrypto NG pool contract (indexed in event)"
        tests:
          - not_null
      - name: token0
        description: "First token in the pool (extracted from coins[1], Trino 1-based)"
        tests:
          - not_null
      - name: token1
        description: "Second token in the pool (extracted from coins[2], Trino 1-based)"
        tests:
          - not_null
      - name: coins
        description: "Raw address[2] array of pool token addresses as decoded from the ABI"
      - name: name
        description: "Pool LP token name string (e.g. 'Curve.fi WBTC/ETH')"
      - name: symbol
        description: "Pool LP token symbol string"
      - name: math
        description: "Address of the math contract used by this pool"
      - name: salt
        description: "bytes32 salt used in deterministic pool deployment (CREATE2)"
      - name: precisions
        description: "uint256[2] packed precision multipliers for each coin"
      - name: packed_a_gamma
        description: "uint256 packed A and gamma parameters for the AMM curve"
      - name: packed_fee_params
        description: "uint256 packed fee parameters"
      - name: packed_rebalancing_params
        description: "uint256 packed rebalancing parameters"
      - name: packed_prices
        description: "uint256 packed initial price parameters"
      - name: deployer
        description: "Address that called the factory to deploy this pool"

  - name: stg_curve_tricrypto_ng_pool_created
    description: >
      Full-decode bronze layer. All TricryptoPoolDeployed ABI fields decoded and output.
      Tricrypto NG pools contain 3 volatile assets (e.g. USDT/BTC/ETH).
      One row per pool creation event. No aggregation.
      Factory addresses sourced from `dim_dex_factory_addresses.sql` (protocol='curve', version='tricrypto_ng').
      Partitioned by blockchain and block_date.
      topic0: 0xa307f5d0802489baddec443058a63ce115756de9020e2b07d3e2cd2f21269e2a
      Event: TricryptoPoolDeployed(address pool, string name, string symbol, address weth, address[3] coins, address math, bytes32 salt, uint256 packed_precisions, uint256 packed_A_gamma, uint256 packed_fee_params, uint256 packed_rebalancing_params, uint256 packed_prices, address deployer)
      Feeds into: `int_dex_pool_created` (UNION ALL branch) and serves as the pool address
      whitelist for `stg_dex_pool_token_transfers`.
    columns:
      - name: blockchain
        description: "Chain the pool was deployed on (e.g. ethereum, arbitrum, base)"
        tests:
          - not_null
      - name: contract_address
        description: "Tricrypto NG factory contract address that emitted the TricryptoPoolDeployed event"
        tests:
          - not_null
      - name: protocol
        description: "Always 'curve'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['curve']
      - name: version
        description: "Always 'tricrypto_ng'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['tricrypto_ng']
      - name: block_date
        description: "Partition column — date of the block"
        tests:
          - not_null
      - name: block_time
        description: "Timestamp of the block"
        tests:
          - not_null
      - name: block_number
        tests:
          - not_null
      - name: tx_hash
        description: "Transaction hash of the pool creation"
        tests:
          - not_null
      - name: tx_from
        description: "Address that submitted the pool creation transaction"
      - name: pool
        description: "Address of the newly created Tricrypto NG pool contract (non-indexed, decoded from data)"
        tests:
          - not_null
      - name: token0
        description: "First token (extracted from coins[1], Trino 1-based)"
        tests:
          - not_null
      - name: token1
        description: "Second token (extracted from coins[2], Trino 1-based)"
        tests:
          - not_null
      - name: token2
        description: "Third token (extracted from coins[3], Trino 1-based). Tricrypto NG pools always have exactly 3 coins."
        tests:
          - not_null
      - name: coins
        description: "Raw address[3] array of pool token addresses as decoded from the ABI"
      - name: weth
        description: "WETH address on this chain (used by Tricrypto for native ETH wrapping)"
      - name: name
        description: "Pool LP token name string"
      - name: symbol
        description: "Pool LP token symbol string"
      - name: math
        description: "Address of the math contract used by this pool"
      - name: salt
        description: "bytes32 salt used in deterministic pool deployment (CREATE2)"
      - name: packed_precisions
        description: "uint256 packed precision multipliers for all three coins"
      - name: packed_a_gamma
        description: "uint256 packed A and gamma parameters"
      - name: packed_fee_params
        description: "uint256 packed fee parameters"
      - name: packed_rebalancing_params
        description: "uint256 packed rebalancing parameters"
      - name: packed_prices
        description: "uint256 packed initial price parameters for coins[2] and coins[3]"
      - name: deployer
        description: "Address that called the factory to deploy this pool"

  - name: stg_curve_stableswap_ng_pool_created
    description: >
      Full-decode bronze layer. All PlainPoolDeployed ABI fields decoded and output.
      StableSwap NG pools contain 2+ stablecoins using the NG (new generation) AMM architecture.
      The pool address is NOT included in the PlainPoolDeployed event — it is recovered from
      evms.creation_traces by joining on tx_hash+blockchain+factory, where c.address = pool.
      One row per pool creation event. No aggregation.
      Factory addresses sourced from dim_dex_factory_addresses.sql (protocol='curve', version='stableswap_ng').
      Partitioned by blockchain and block_date.
      topic0: 0xd1d60d4611e4091bb2e5f699eeb79136c21ac2305ad609f3de569afc3471eecc
      Event: PlainPoolDeployed(address[] coins, uint256 A, uint256 fee, address deployer)
      Feeds into: int_dex_pool_created (UNION ALL branch).
    columns:
      - name: blockchain
        description: "Chain the pool was deployed on (e.g. ethereum, arbitrum, base)"
        tests:
          - not_null
      - name: contract_address
        description: "StableSwap NG factory contract address that emitted the PlainPoolDeployed event"
        tests:
          - not_null
      - name: protocol
        description: "Always 'curve'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['curve']
      - name: version
        description: "Always 'stableswap_ng'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['stableswap_ng']
      - name: block_date
        description: "Partition column — date of the block"
        tests:
          - not_null
      - name: block_time
        description: "Timestamp of the block"
        tests:
          - not_null
      - name: block_number
        tests:
          - not_null
      - name: tx_hash
        description: "Transaction hash of the pool creation"
        tests:
          - not_null
      - name: tx_from
        description: "Address that submitted the pool creation transaction"
      - name: pool
        description: "Address of the newly created StableSwap NG pool contract (from evms.creation_traces, not event)"
        tests:
          - not_null
      - name: token0
        description: "First token (extracted from coins[1], Trino 1-based)"
        tests:
          - not_null
      - name: token1
        description: "Second token (extracted from coins[2], Trino 1-based)"
        tests:
          - not_null
      - name: token2
        description: "Third token (extracted from coins[3] if cardinality >= 3, else null)"
      - name: token3
        description: "Fourth token (extracted from coins[4] if cardinality >= 4, else null)"
      - name: token4
        description: "Fifth token (extracted from coins[5] if cardinality >= 5, else null)"
      - name: token5
        description: "Sixth token (extracted from coins[6] if cardinality >= 6, else null)"
      - name: token6
        description: "Seventh token (extracted from coins[7] if cardinality >= 7, else null)"
      - name: token7
        description: "Eighth token (extracted from coins[8] if cardinality >= 8, else null). MAX_COINS=8 enforced by the StableSwap NG factory contract."
      - name: coins
        description: "Raw dynamic address[] array of all pool token addresses as decoded from the ABI (2–8 elements)"
      - name: a
        description: "Amplification coefficient A (uint256)"
      - name: fee
        description: "Initial fee parameter (uint256, in basis-point units per Curve convention)"
      - name: deployer
        description: "Address that called the factory to deploy this pool"

  - name: stg_curve_stableswap_legacy_pool_created
    description: >
      Full-decode bronze layer. All PlainPoolDeployed (address[4]) ABI fields decoded and output.
      Legacy StableSwap pools use the original Curve AMM design for correlated assets.
      The pool address is NOT included in the PlainPoolDeployed event — it is recovered from
      evms.creation_traces by joining on tx_hash+blockchain+factory, where c.address = pool.
      Fixed 4-slot coins array — unused slots contain the zero address (extracted as null).
      Factory addresses sourced from dim_dex_factory_addresses.sql (protocol='curve', version='stableswap_legacy').
      Partitioned by blockchain and block_date.
      topic0: 0x5b4a28c940282b5bf183df6a046b8119cf6edeb62859f75e835eb7ba834cce8d
      Event: PlainPoolDeployed(address[4] coins, uint256 A, uint256 fee, address deployer)
      Feeds into: int_dex_pool_created (UNION ALL branch).
    columns:
      - name: blockchain
        description: "Chain the pool was deployed on (e.g. ethereum, arbitrum, base)"
        tests:
          - not_null
      - name: contract_address
        description: "StableSwap Legacy factory contract address that emitted the PlainPoolDeployed event"
        tests:
          - not_null
      - name: protocol
        description: "Always 'curve'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['curve']
      - name: version
        description: "Always 'stableswap_legacy'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['stableswap_legacy']
      - name: block_date
        description: "Partition column — date of the block"
        tests:
          - not_null
      - name: block_time
        description: "Timestamp of the block"
        tests:
          - not_null
      - name: block_number
        tests:
          - not_null
      - name: tx_hash
        description: "Transaction hash of the pool creation"
        tests:
          - not_null
      - name: tx_from
        description: "Address that submitted the pool creation transaction"
      - name: pool
        description: "Address of the newly created StableSwap Legacy pool contract (from evms.creation_traces, not event)"
        tests:
          - not_null
      - name: token0
        description: "First token (extracted from coins[1], Trino 1-based)"
        tests:
          - not_null
      - name: token1
        description: "Second token (extracted from coins[2], Trino 1-based)"
        tests:
          - not_null
      - name: token2
        description: "Third token (extracted from coins[3] if non-zero address, else null)"
      - name: token3
        description: "Fourth token (extracted from coins[4] if non-zero address, else null). address[4] is the max for legacy pools."
      - name: coins
        description: "Raw address[4] array of pool token addresses as decoded from the ABI. Unused slots contain the zero address."
      - name: a
        description: "Amplification coefficient A (uint256)"
      - name: fee
        description: "Initial fee parameter (uint256, in basis-point units per Curve convention)"
      - name: deployer
        description: "Address that called the factory to deploy this pool"
