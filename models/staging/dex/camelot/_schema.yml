version: 2

models:
  - name: stg_camelot_v2_pool_created
    description: >
      Full-decode bronze layer. All PairCreated ABI fields decoded and output.
      Decoded PairCreated events from Camelot V2 (Uniswap V2 fork) factory contracts across all official deployments.
      One row per pool creation event. No aggregation.
      Factory addresses sourced from `dim_dex_factory_addresses.sql`.
      Partitioned by blockchain and block_date.
      Camelot is deployed exclusively on Arbitrum — `blockchain` is always 'arbitrum'.
      Feeds into: `int_dex_pool_created` (UNION ALL branch) and serves as the pool address
      whitelist for `stg_dex_pool_token_transfers`.
    columns:
      - name: blockchain
        description: "Always 'arbitrum' — Camelot V2 is Arbitrum-only"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['arbitrum']
      - name: contract_address
        description: "Factory contract address that emitted the event"
        tests:
          - not_null
      - name: protocol
        description: "Always 'camelot'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['camelot']
      - name: version
        description: "Always '2'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['2']
      - name: block_date
        description: "Partition column — date of the block"
        tests:
          - not_null
      - name: block_time
        description: "Timestamp of the block"
        tests:
          - not_null
      - name: block_number
        tests:
          - not_null
      - name: tx_hash
        description: "Transaction hash of the pool creation"
        tests:
          - not_null
      - name: tx_from
        description: "Address that submitted the pool creation transaction"
      - name: pool
        description: "Address of the newly created pair/pool contract"
        tests:
          - not_null
      - name: token0
        description: "First token in the pair (lower address, per Uniswap V2 convention)"
        tests:
          - not_null
      - name: token1
        description: "Second token in the pair (higher address)"
        tests:
          - not_null

  - name: stg_camelot_v3_pool_created
    description: >
      Full-decode bronze layer. All Pool ABI fields decoded and output (token0, token1, pool).
      Decoded Pool events from Camelot V3 (Algebra Finance V1.9) factory contracts across all official deployments.
      One row per pool creation event. No aggregation.
      Uses Pool(address,address,address) event — NOT the Uniswap V3 PoolCreated event.
      No fee or tick_spacing (Algebra Finance uses dynamic directional fees — not in the creation event).
      Factory addresses sourced from `dim_dex_factory_addresses.sql`.
      Partitioned by blockchain and block_date.
      Camelot is deployed exclusively on Arbitrum — `blockchain` is always 'arbitrum'.
      Feeds into: `int_dex_pool_created` (UNION ALL branch) and serves as the pool address
      whitelist for `stg_dex_pool_token_transfers`.
    columns:
      - name: blockchain
        description: "Always 'arbitrum' — Camelot V3 is Arbitrum-only"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['arbitrum']
      - name: contract_address
        description: "Factory contract address that emitted the event"
        tests:
          - not_null
      - name: protocol
        description: "Always 'camelot'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['camelot']
      - name: version
        description: "Always '3'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['3']
      - name: block_date
        description: "Partition column — date of the block"
        tests:
          - not_null
      - name: block_time
        description: "Timestamp of the block"
        tests:
          - not_null
      - name: block_number
        tests:
          - not_null
      - name: tx_hash
        description: "Transaction hash of the pool creation"
        tests:
          - not_null
      - name: tx_from
        description: "Address that submitted the pool creation transaction"
      - name: pool
        description: "Address of the newly created pool contract"
        tests:
          - not_null
      - name: token0
        description: "First token in the pool (indexed in event)"
        tests:
          - not_null
      - name: token1
        description: "Second token in the pool (indexed in event)"
        tests:
          - not_null
