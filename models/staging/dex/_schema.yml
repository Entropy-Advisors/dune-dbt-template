version: 2

# Cross-protocol / shared staging models.
# Protocol-specific staging models have their own _schema.yml in each protocol subfolder:
#   uniswap/    sushiswap/    pancakeswap/    camelot/    gammaswap/    curve/    balancer/

models:
  - name: stg_dex_pool_token_transfers
    description: >
      ERC20 and native token transfer events to and from tracked DEX pool contracts, across all chains.
      Each row is a single token transfer classified as 'inflow' or 'outflow'.
      Amount is signed: positive for inflows, negative for outflows — sum downstream to get net change.

      price_usd and amount_usd are captured at transfer time for future TVL use.
      They are not used in the balance model but avoid a costly backfill later.

      V4 note: Uniswap V4 balance is tracked at the PoolManager level (one contract per chain),
      not per individual pool. This is because V4 pools do not have their own contracts.

      Curve note: Curve pools with 3–8 tokens (tricrypto_ng, stableswap_ng, stableswap_legacy)
      are fully covered — token2 through token7 are included in the pool_tokens whitelist
      wherever non-null.
    columns:
      - name: blockchain
        tests:
          - not_null
      - name: block_date
        tests:
          - not_null
      - name: block_time
        tests:
          - not_null
      - name: block_number
        tests:
          - not_null
      - name: tx_hash
        tests:
          - not_null
      - name: evt_index
        tests:
          - not_null
      - name: event_type
        description: "'inflow' (token enters pool) or 'outflow' (token leaves pool)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['inflow', 'outflow']
      - name: pool
        description: "Pool contract address (or PoolManager address for Uniswap V4)"
        tests:
          - not_null
      - name: protocol
        tests:
          - not_null
      - name: version
        tests:
          - not_null
      - name: min_block_time
        description: "Timestamp of pool creation event. Used to anchor the days spine in fact_dex_pool_daily_token_balance — spine starts at creation, not first transfer."
        tests:
          - not_null
      - name: token_address
        description: "Contract address of the token being transferred"
        tests:
          - not_null
      - name: symbol
        description: "Token symbol from tokens.transfers"
      - name: amount_raw
        description: "Transfer amount in raw integer units (no decimals applied). Signed: positive for inflow, negative for outflow."
        tests:
          - not_null
      - name: amount
        description: "Transfer amount in human-readable units. Positive for inflow, negative for outflow."
        tests:
          - not_null
      - name: price_usd
        description: "Token price in USD at time of transfer. NULL if price unavailable."
      - name: amount_usd
        description: "USD value of the transfer. Positive for inflow, negative for outflow. NULL if price unavailable."
      - name: from_address
        description: "Sender on the transfer event. For inflows: the depositor/router address. For outflows: the pool contract address (or PoolManager for V4)."
        tests:
          - not_null
      - name: to_address
        description: "Recipient on the transfer event. For inflows: the pool contract address (or PoolManager for V4). For outflows: the withdrawer/router address."
        tests:
          - not_null
