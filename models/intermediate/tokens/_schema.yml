version: 2

models:
  - name: int_token_daily_net_change
    description: >
      Daily mint/burn volumes and net change per token per chain. One row per (day, blockchain,
      contract_address) for days with activity — no gap-fill, no spine, no cumulative columns.

      Fed by: `stg_token_mint_burn_events`.
      Feeds: `fact_token_daily_supply`.

      Cheap GROUP BY view — mirrors the DEX pattern (`int_dex_pool_daily_net_change`).
      The daily spine, gap-fill, and cumulative columns are owned by `fact_token_daily_supply` (the mart).
    columns:
      - name: day
        description: "Day-truncated date (days with no activity are absent — no gap-fill here)"
        tests:
          - not_null
      - name: blockchain
        tests:
          - not_null
      - name: contract_address
        tests:
          - not_null
      - name: symbol
      - name: category
        description: "Token category from dim_labels (sourced via staging)"
      - name: mint_volume
        description: "Tokens minted on this day"
      - name: burn_volume
        description: "Tokens burned on this day (positive figure)"
      - name: net_change
        description: "mint_volume - burn_volume for this day"

  - name: int_token_holder_daily_net_change
    description: >
      Daily net transfer amount per (blockchain, contract_address, wallet_address).
      One row per (day, wallet, token) for days with activity — no gap-fill, no spine, no cumulative columns.

      Fed by: `stg_token_holder_transfers`.
      Feeds: `fact_token_holder_daily_balance`.

      `min_block_time` passes through from `dim_labels` (token deployment timestamp, constant per contract)
      and is used by the mart to anchor the per-wallet days spine.

      Cheap GROUP BY view — mirrors the DEX pattern (`int_dex_pool_daily_net_change`).
      The daily spine, gap-fill, and cumulative balance are owned by `fact_token_holder_daily_balance`.
    columns:
      - name: day
        description: "Day-truncated date (days with no activity are absent — no gap-fill here)"
        tests:
          - not_null
      - name: blockchain
        tests:
          - not_null
      - name: contract_address
        tests:
          - not_null
      - name: wallet_address
        description: "Wallet address (zero address excluded)"
        tests:
          - not_null
      - name: symbol
      - name: category
        description: "Token category from dim_labels (sourced via staging)"
      - name: min_block_time
        description: "Token deployment timestamp from dim_labels (constant per contract)"
      - name: net_change
        description: "Sum of signed amounts for this (day, wallet, token) — positive = net inflow, negative = net outflow"
