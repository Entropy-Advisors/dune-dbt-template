version: 2

models:
  - name: int_dex_pool_daily_net_change
    description: >
      Daily net token change per (blockchain, pool, token).
      Aggregates all signed inflows and outflows from stg_dex_pool_token_transfers by day.
      This is a cheap GROUP BY view — no cumulative logic, no window functions.
      Fed by: `stg_dex_pool_token_transfers`.
      Feeds: `fact_dex_pool_token_balance` (running balance with days spine).
    columns:
      - name: blockchain
        tests:
          - not_null
      - name: day
        description: "Calendar date (block_date truncated to day)"
        tests:
          - not_null
      - name: pool
        description: "Pool contract address, or PoolManager address for Uniswap V4"
        tests:
          - not_null
      - name: protocol
        tests:
          - not_null
      - name: version
        tests:
          - not_null
      - name: token_address
        tests:
          - not_null
      - name: symbol
      - name: min_block_time
        description: "Timestamp of pool creation. Passed through from int_dex_pool_created; anchors the days spine in fact_dex_pool_token_balance — spine starts at creation, not first transfer."
        tests:
          - not_null
      - name: net_change
        description: "Sum of all inflows and outflows for this pool/token on this day. Negative means more left than entered."
        tests:
          - not_null
      - name: net_change_usd
        description: "USD value of net_change. NULL if price was unavailable at transfer time."

  - name: int_dex_pool_created
    description: >
      Union of all DEX pool creation events across all tracked protocols and versions.
      Each row represents a single pool creation (or initialization) event.

      Fed by (14 staging models — one UNION ALL branch each):
        stg_uniswap_v2_pool_created, stg_uniswap_v3_pool_created, stg_uniswap_v4_pool_initialized,
        stg_sushiswap_v2_pool_created, stg_sushiswap_v3_pool_created,
        stg_pancakeswap_v2_pool_created, stg_pancakeswap_v3_pool_created,
        stg_gammaswap_pool_created, stg_camelot_v2_pool_created, stg_camelot_v3_pool_created,
        stg_curve_twocrypto_ng_pool_created, stg_curve_tricrypto_ng_pool_created,
        stg_curve_stableswap_ng_pool_created, stg_curve_stableswap_legacy_pool_created.
      Feeds: `stg_dex_pool_token_transfers` (pool address whitelist and min_block_time),
        `int_dex_pool_daily_net_change` (via stg_dex_pool_token_transfers).

      Protocol coverage: Uniswap V2/V3/V4, SushiSwap V2/V3, PancakeSwap V2/V3,
      GammaSwap (DeltaSwap), Camelot V2/V3, Curve StableSwap Legacy, Curve StableSwap NG,
      Curve TwoCrypto NG, Curve Tricrypto NG.

      Column notes:
        - fee / tick_spacing: NULL for V2-style protocols and Camelot V3 (Algebra dynamic fees).
        - hooks / sqrt_price_x96 / tick: Non-NULL for Uniswap V4 only.
        - token2-token7: NULL for all 2-token protocols. token2 always non-null for tricrypto_ng.
          token2/token3 present for stableswap_legacy (up to 4 coins). token2-token7 present for
          stableswap_ng (up to 8 coins, cardinality-guarded).
        - pool: For all protocols except Uniswap V4, this is the pool contract address (varbinary).
          For Uniswap V4, this is the PoolId (bytes32 hash of the pool key) — not a contract address.
          Multiple V4 pools can share the same token pair, differentiated by fee/hooks/tick_spacing.
        - contract_address: For V2/V3, this is the factory contract.
          For Uniswap V4, this is the PoolManager contract (one per chain).
    columns:
      - name: blockchain
        tests:
          - not_null
      - name: contract_address
        description: "Factory contract address (V2/V3) or PoolManager address (V4)"
        tests:
          - not_null
      - name: protocol
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['uniswap', 'sushiswap', 'pancakeswap', 'gammaswap', 'camelot', 'curve']
      - name: version
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['2', '3', '4', 'deltaswap', 'stableswap_ng', 'twocrypto_ng', 'tricrypto_ng', 'stableswap_legacy']
      - name: min_block_date
        tests:
          - not_null
      - name: min_block_time
        tests:
          - not_null
      - name: min_block_number
        tests:
          - not_null
      - name: tx_hash
        tests:
          - not_null
      - name: tx_from
        tests:
          - not_null
      - name: pool
        description: >
          Pool contract address for V2/V3.
          For Uniswap V4: PoolId (bytes32) — a hash of the pool key (token0, token1, fee, tickSpacing, hooks).
          Not a contract address; V4 pools do not have their own contracts.
        tests:
          - not_null
      - name: token0
        tests:
          - not_null
      - name: token1
        tests:
          - not_null
      - name: token2
        description: "Third token. Non-null for tricrypto_ng (always 3 coins), stableswap_legacy (when 3+ coins), and stableswap_ng (when 3+ coins). NULL for all 2-token protocols."
      - name: token3
        description: "Fourth token. Non-null for stableswap_legacy (when 4 coins) and stableswap_ng (when 4+ coins). NULL for all other protocols."
      - name: token4
        description: "Fifth token. Non-null for stableswap_ng only (when 5+ coins). NULL for all other protocols."
      - name: token5
        description: "Sixth token. Non-null for stableswap_ng only (when 6+ coins). NULL for all other protocols."
      - name: token6
        description: "Seventh token. Non-null for stableswap_ng only (when 7+ coins). NULL for all other protocols."
      - name: token7
        description: "Eighth token. Non-null for stableswap_ng only (when 8 coins). NULL for all other protocols."
      - name: fee
        description: "Fee tier in hundredths of a bip (e.g. 3000 = 0.3%). NULL for V2 and Camelot V3."
      - name: tick_spacing
        description: "Tick spacing for concentrated liquidity pools. NULL for V2 and Camelot V3."
      - name: hooks
        description: "Uniswap V4 only. Hooks contract address; 0x000...000 when no hooks are attached. NULL for all other protocols."
      - name: sqrt_price_x96
        description: "Uniswap V4 only. Initial sqrt price at pool creation (Q64.96 fixed point). NULL for all other protocols."
      - name: tick
        description: "Uniswap V4 only. Initial tick at pool creation. NULL for all other protocols."
